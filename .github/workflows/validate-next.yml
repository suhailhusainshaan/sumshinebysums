name: Next.js Validation

on:
  pull_request:
    branches:
      - main
      - uat

jobs:
  check-changes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to see previous commits for git diff

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # 1. Lint Changed Files Only (The direct equivalent to your PHP script)
      - name: Run ESLint on Changed Files
        run: |
          git fetch origin ${{ github.base_ref }}
          # Get changed .js, .ts, .tsx files
          CHANGED_FILES=$(git diff --name-only --diff-filter=ACMRT origin/${{ github.base_ref }} | grep -E '\.(js|ts|tsx)$' || true)
          
          if [ -n "$CHANGED_FILES" ]; then
            echo "Linting changed files:"
            echo "$CHANGED_FILES"
            npx eslint $CHANGED_FILES --max-warnings=0
          else
            echo "No JS/TS files changed."
          fi

      # 2. Type Check (The PHPStan equivalent)
      # Note: We run tsc on the whole project because TS changes can break 
      # files you didn't touch, but it's still very fast.
      - name: TypeScript Check
        run: npx tsc --noEmit
